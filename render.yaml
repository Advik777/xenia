# Render Blueprint — Express API (backend/)
# Dashboard: https://dashboard.render.com
# Live API:  https://xenlens-backend.onrender.com
services:
  - type: web
    name: xenlens-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://xyrisvision.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://xyrisvision.vercel.app,http://localhost:3000,http://localhost:5500,http://127.0.0.1:3000,http://127.0.0.1:5500
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CREDIT_API_KEY_OPENROUTER
        sync: false
      - key: MODEL_API_USERS_OPENROUTER
        value: anthropic/claude-opus-4.8:extra
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: CREDITS_GRANTED_USD
        value: "5.00"
      - key: SUPPORT_EMAIL
        value: aegiswheil@gmail.com
      - key: ADMIN_EMAIL
        value: aegiswheil@gmail.com
